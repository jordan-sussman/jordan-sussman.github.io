---
layout: default
---

<body class="blog-page">
  <div class="blog-container">
    <a class="blog-back" href="/">← Back</a>
    <h1>Blog</h1>
    <ul class="blog-list">
      {% for post in site.posts %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
        <div class="post-date">{{ post.date | date: "%B %d, %Y" }}</div>
      </li>
      {% endfor %}
    </ul>
  </div>
</body>
