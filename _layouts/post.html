---
layout: default
---

<body class="blog-page">
  <div class="blog-container blog-post">
    <a class="blog-back" href="/blog">← Blog</a>
    <h1>{{ page.title }}</h1>
    <span class="post-date">{{ page.date | date: "%B %d, %Y" }}</span>
    <div class="blog-post-content">{{ content }}</div>
  </div>
</body>
